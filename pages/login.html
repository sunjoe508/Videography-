<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in – Lens & Frame</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a href="../index.html" style="font-family:var(--font-serif);font-size:1.3rem;color:var(--ink);display:block;margin-bottom:32px;">
      Lens<em style="font-style:italic;color:var(--accent)">&</em>Frame
    </a>
    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to manage your bookings.</p>

    <form id="loginForm" style="display:flex;flex-direction:column;gap:18px;">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <div id="error-msg" style="color:var(--danger);font-size:0.875rem;display:none;"></div>
      <button type="submit" class="btn btn-primary" id="submitBtn">
        Sign in
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <a href="forgot-password.html" style="font-size:0.8rem;color:var(--ink-muted)">Forgot your password?</a>
    </div>
  </div>
</div>

<script type="module">
  import sb from '../js/supabase.js';
  import { getUser, toast } from '../js/utils.js';

  // Redirect if already logged in
  const user = await getUser();
  if (user) window.location.href = '/pages/bookings.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
      return;
    }

    // Check if admin
    const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
    if (profile?.role === 'admin') {
      window.location.href = '/admin/dashboard.html';
    } else {
      window.location.href = '/pages/bookings.html';
    }
  });
</script>
</body>
</html>

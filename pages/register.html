<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account – Lens & Frame</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a href="../index.html" style="font-family:var(--font-serif);font-size:1.3rem;color:var(--ink);display:block;margin-bottom:32px;">
      Lens<em style="font-style:italic;color:var(--accent)">&</em>Frame
    </a>
    <h2>Create your account</h2>
    <p class="auth-sub">Start booking world-class photography & video.</p>

    <form id="registerForm" style="display:flex;flex-direction:column;gap:18px;">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First name</label>
          <input type="text" id="firstName" class="form-control" placeholder="Jane" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last name</label>
          <input type="text" id="lastName" class="form-control" placeholder="Smith" required>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" class="form-control" placeholder="+1 (555) 000-0000">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min 8 characters" minlength="8" required>
      </div>
      <div id="error-msg" style="color:var(--danger);font-size:0.875rem;display:none;"></div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Create account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script type="module">
  import sb from '../js/supabase.js';
  import { getUser } from '../js/utils.js';

  const user = await getUser();
  if (user) window.location.href = '/pages/bookings.html';

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account…';

    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const email     = document.getElementById('email').value.trim();
    const phone     = document.getElementById('phone').value.trim();
    const password  = document.getElementById('password').value;
    const fullName  = `${firstName} ${lastName}`;

    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { full_name: fullName, phone } }
    });

    if (error) {
      errEl.textContent = error.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create account';
      return;
    }

    // Profile is auto-created by Supabase trigger (see SQL setup)
    window.location.href = '/pages/bookings.html';
  });
</script>
</body>
</html>
